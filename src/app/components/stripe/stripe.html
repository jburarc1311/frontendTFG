<div class="donacion-container">
  <h2>Hacer una donación</h2>
  <p>Tu donación ayuda a los animales a encontrar un hogar</p>

  @if (exitoso) {
    <div class="exito">
      <p>🎉 ¡Gracias por tu donación de €{{ montoSeleccionado }}!</p>
    </div>
  } @else {
    <div class="montos">
      @for (monto of montosPredefinidos; track monto) {
        <button [class.activo]="montoSeleccionado === monto" (click)="seleccionarMonto(monto)">
          €{{ monto }}
        </button>
      }
    </div>

    <p class="monto-total">
      Vas a donar: <strong>€{{ montoSeleccionado }}</strong>
    </p>

    <div #paymentElement></div>

    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }

    <button class="btn-donar" (click)="donar()" >
      Donar
    </button>
  }
</div>
