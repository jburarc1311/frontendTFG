<section class="perfil-layout">
  <div class="perfil-cover"></div>

  <input #fileInput type="file" hidden accept="image/*" (change)="onFotoSeleccionada($event)" />

  <div class="perfil-header">
    <div class="avatar-wrapper" (click)="abrirSelectorFoto()" [class.avatar-loading]="cargandoFoto">
      <img
        [src]="usuario?.photo ? usuario.photo : '/image.png'"
        alt="Foto de perfil"
        class="img-user"
      />
      <button type="button" class="avatar-edit-btn" aria-label="Cambiar foto">
        <i *ngIf="!cargandoFoto" class="fa-solid fa-pen"></i>
        <i *ngIf="cargandoFoto" class="fa-solid fa-spinner animate-spin"></i>
      </button>
    </div>

    <div class="perfil-user-meta">
      <div class="perfil-user-top">
        <h2>{{ usuario?.name }}</h2>
        <span class="perfil-badge">Adoptante activa</span>
      </div>
      <p>{{ usuario?.role }}</p>
    </div>
  </div>

  <div *ngIf="mensajeError" class="alert alert-error">
    {{ mensajeError }}
  </div>

  <div class="perfil-card">
    <div class="perfil-card-title">
      <h3>Informacion Personal</h3>
      <p>Actualiza tus datos para mejorar tu experiencia en la comunidad.</p>
    </div>

    <form class="perfil-form">
      <div class="perfil-grid">
        <div class="field">
          <label for="nombre">Nombre Completo</label>
          <div class="input-with-icon">
            <input
              id="nombre"
              type="text"
              placeholder="Nombre completo"
              [(ngModel)]="nombre"
              name="nombre"
            />
            <i class="fa-solid fa-pen"></i>
          </div>
        </div>

        <div class="field">
          <label for="correo">Correo Electronico</label>
          <div class="input-with-icon">
            <input id="correo" type="text" [value]="usuario?.email" disabled />
            <i class="fa-solid fa-pen"></i>
          </div>
        </div>

        <div class="field field-full">
          <label class="mb-2 block text-xs font-black uppercase tracking-[0.28em] text-slate-600"
            >Ubicación</label
          >
          <div class="flex flex-row flex-wrap gap-4">
            <div class="flex-1"> 
              <button
                type="button"
                (click)="obtenerCoordenadas()"
                class="location-btn rounded-2xl border border-slate-200 bg-white px-4 py-4 text-slate-900 outline-none transition hover:border-teal-500 focus:ring-4 focus:ring-teal-500/10"
              >
                Obtener
              </button>
            </div>
            <div class="input-with-icon location-input-wrapper flex-1">
              <input
                id="ubicacion"
                type="text"
                placeholder="Ubicacion"
                [(ngModel)]="ubicacion"
                name="ubicacion"
                disabled=""
              />
              <i class="fa-solid fa-map-pin"></i>
            </div>
          </div>
        </div>

        <div class="field field-full">
          <label for="descripcion">Sobre mi</label>
          <div class="input-with-icon textarea-wrap">
            <textarea
              id="descripcion"
              rows="4"
              placeholder="Cuentanos un poco de ti"
              [(ngModel)]="descripcion"
              name="descripcion"
            ></textarea>
            <i class="fa-solid fa-pen"></i>
          </div>
        </div>
      </div>

      <div class="perfil-actions">
        <button type="button" class="btn btn-secondary" (click)="cancelarCambios()">
          Cancelar
        </button>
        <button
          type="button"
          class="btn btn-primary"
          (click)="guardarCambios()"
          [disabled]="guardandoCambios"
        >
          <span>Guardar Cambios</span>
        </button>
      </div>
    </form>
  </div>
</section>
