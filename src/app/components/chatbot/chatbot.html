<!-- Botón flotante circular -->
<button class="chat-button-float" (click)="toggleModal()" [attr.title]="'chatbot.open' | translate">
  💬
</button>

<!-- Modal del chat -->
<div *ngIf="modalAbierto" class="modal-overlay" (click)="cerrarModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ 'chatbot.title' | translate }}</h3>
      <button
        class="close-button"
        (click)="cerrarModal()"
        [attr.aria-label]="'chatbot.close' | translate"
      >
        ✕
      </button>
    </div>

    <div class="chat-container">
      <div class="mensajes">
        <div
          *ngFor="let msg of mensajes"
          [class.usuario]="msg.usuario"
          [class.bot]="!msg.usuario"
          class="mensaje"
        >
          {{ msg.texto }}
        </div>

        <div *ngIf="cargando" class="bot mensaje">
          {{ 'chatbot.typing' | translate }}
        </div>
      </div>

      <div class="input-container">
        <input
          type="text"
          [(ngModel)]="mensaje"
          (keyup.enter)="enviarMensaje()"
          [placeholder]="'chatbot.placeholder' | translate"
        />

        <button (click)="enviarMensaje()">
          {{ 'chatbot.send' | translate }}
        </button>
      </div>
    </div>
  </div>
</div>
